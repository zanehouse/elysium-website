<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium — Under Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    /* =========================================
   ELYSIUM CAPITAL — STYLE.CSS
   ========================================= */

@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
@font-face {
  font-family: 'Helvetica Neue';
  src: url('/assets/fonts/HelveticaNeue-Roman.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
:root {
  --bg:       #0D0D0D;
  --surface:  #0F0F0F;
  --card:     #141414;
  --border:   #222222;
  --text:     #D4D4D4;
  --muted:    #888888;
  --accent:   #D4D4D4;
  --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-serif: 'Libre Baskerville', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

::selection {
  background: hsla(60, 100%, 50%, 0.875);
  color: var(--bg);
}

.unselectable {
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Reveal base state */
/* ─── Institutional Motion Refinement ─── */

html.js .reveal {
  will-change: opacity, transform;
}

/* Slightly slower easing for premium feel */
html.js .reveal.active {
  transition-timing-function: cubic-bezier(0.25, 1, 0.35, 1);
}

/* Gentle spatial rhythm when stacked sections reveal */
.framework-section.reveal,
section.reveal {
  padding-top: 0.5rem;
  padding-bottom: 0.5rem;
}
.reveal {
  opacity: 0;
  transform: translateX(-12px);
  transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
              transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: opacity, transform;
}

/* When revealed */
.reveal.active {
  opacity: 1;
  transform: translateX(0);
}

/* Accessibility */
@media (prefers-reduced-motion: reduce) {
  .reveal {
    opacity: 1;
    transform: none;
    transition: none;
  }
}

/* ── LINKS ── */
a { color: var(--text); text-decoration: none; transition: opacity .2s; }
a:hover { opacity: .6; }

/* ── NAV ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,13,13,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 2rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-family: var(--font-sans);
  font-size: .75rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--text);
  height: 3em;
  opacity: .8;
  transition: opacity .2s;
}
.nav-logo:hover { opacity: 1; }

nav { display: flex; gap: 2.5rem; }

nav a {
  font-size: .72rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--muted);
  transition: color .2s;
}
nav a:hover, nav a.active { color: var(--text); opacity: 1; }

/* Hamburger */
.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.nav-toggle span {
  display: block;
  width: 22px;
  height: 1px;
  background: var(--text);
  transition: transform .3s, opacity .3s;
}

/* Mobile nav */
@media (max-width: 640px) {
  .nav-toggle { display: flex; }

  nav {
    display: none;
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    flex-direction: column;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  nav.open { display: flex; }
  nav a {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
  }

  /* Hamburger → X */
  .nav-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2) { opacity: 0; }
  .nav-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
}

/* ── LAYOUT ── */
main { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

/* ── HERO ── */
.hero {
  padding: 7rem 0 5rem;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  font-size: .68rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2rem;
}

.hero-headline {
  font-family: var(--font-serif);
  font-size: clamp(2.6rem, 6vw, 5rem);
  font-weight: 400;
  line-height: 1.12;
  color: var(--text);
  max-width: 780px;
  margin-bottom: 1.8rem;
  letter-spacing: -.01em;
}

.hero-sub {
  font-size: 1rem;
  color: var(--muted);
  max-width: 520px;
  line-height: 1.8;
}

/* ── SECTION HEADERS ── */
.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 4rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.section-title {
  font-size: .68rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
}

.section-link {
  font-size: .68rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}


.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px;
  margin-bottom: 4rem;
}

/* ── CARD BASE ── */

.card {
  background: var(--card);
  padding: 2rem;
  border: 1px solid var(--border);

  position: relative;
  overflow: hidden;

  transition:
    background .25s ease,
    transform .25s ease,
    box-shadow .25s ease;
}

.card:hover {
  background: #1a1a1a;
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.08);
}

/* ── ICON OVERLAY ── */

.card-icon {
  position: absolute;
  right: 1.25rem;
  top: 1.25rem;

  opacity: 0;
  transition: opacity .25s ease;

  pointer-events: none;
}

.card:hover .card-icon {
  opacity: 0.18;
}

.card-icon svg {
  width: 3rem;
  height: 3rem;

  stroke-width: 1.2;
  stroke: rgba(15, 23, 42, 0.35);
}

/* ── TYPOGRAPHY ── */

.card-date {
  font-size: .65rem;
  letter-spacing: .16em;
  text-transform: uppercase;

  color: var(--muted);

  margin-bottom: 1rem;
}

.card-title {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-weight: 400;
  line-height: 1.35;

  margin-bottom: .9rem;

  color: var(--text);
}

.card-summary {
  font-size: .875rem;
  color: var(--muted);
  line-height: 1.75;

  margin-bottom: 1.4rem;
}



/* ── CTA ── */

.card-cta {
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;

  color: var(--text);

  border-bottom: 1px solid var(--border);
  padding-bottom: .125rem;

  display: inline-block;
}

/* ── GRADIENT MICRO AUTHORITY EFFECT ── */

.card::after {
  content: "";
  position: absolute;
  inset: 0;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.06),
    transparent 60%
  );

  opacity: 0;
  transition: opacity .25s ease;

  pointer-events: none;
}

.card:hover::after {
  opacity: 1;
}

/* ── PAGE TITLE (inner pages) ── */
.page-hero {
  padding: 5rem 0 3.5rem;
  border-bottom: 1px solid var(--border);
}

.page-hero h1 {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 400;
  color: var(--text);
  letter-spacing: -.01em;
  line-height: 1.2;
}

.page-hero p {
  font-size: .875rem;
  color: var(--muted);
  margin-top: 1rem;
  max-width: 560px;
}

/* ── RESEARCH LIST ── */
.research-list { margin: 0; padding: 0; list-style: none; }

.research-item {
  display: grid;
  grid-template-columns: 120px 1fr auto;
  gap: 2rem;
  align-items: start;
  padding: 2rem 0;
  border-bottom: 1px solid var(--border);
}

@media (max-width: 640px) {
  .research-item { grid-template-columns: 1fr; gap: .75rem; }
  .research-item-cta { display: none; }
}

.research-item-date {
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  padding-top: .25rem;
}

.research-item-title {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 400;
  line-height: 1.4;
  margin-bottom: .5rem;
}

.research-item-summary {
  font-size: .85rem;
  color: var(--muted);
  line-height: 1.75;
}

.research-item-cta {
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  padding-top: .3rem;
  white-space: nowrap;
  transition: color .2s;
}
.research-item-cta:hover { color: var(--text); opacity: 1; }

/* ── ARTICLE ── */
.article-header {
  padding: 5rem 0 3rem;
  border-bottom: 1px solid var(--border);
  max-width: 720px;
}

.article-header h1 {
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 400;
  line-height: 1.22;
  margin-bottom: 1.2rem;
}

.article-meta {
  display: flex;
  gap: 2rem;
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}

.article-body {
  max-width: 680px;
  padding: 3rem 0 5rem;
}

.article-body p {
  font-size: .9375rem;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 1.5rem;
}

.article-body h2 {
  font-size: .68rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 3rem 0 1rem;
}

.pull-quote {
  font-family: var(--font-serif);
  font-size: 1.35rem;
  font-style: italic;
  font-weight: 400;
  line-height: 1.5;
  color: var(--text);
  border-left: 1px solid var(--border);
  padding: 1rem 0 1rem 2rem;
  margin: 2.5rem 0;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 2rem 0 0;
  border-top: 1px solid var(--border);
}
.back-link:hover { color: var(--text); opacity: 1; }

/* ── FRAMEWORK ── */
.framework-intro {
  padding: 4rem 0 3rem;
  border-bottom: 1px solid var(--border);
  max-width: 680px;
}

.framework-intro p {
  font-size: .9375rem;
  color: var(--muted);
  line-height: 1.85;
}

.framework-section {
  padding: 3rem 0;
  border-bottom: 1px solid var(--border);
  max-width: 760px;
}

.framework-section-num {
  font-size: .62rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.2rem;
}

.framework-section h2 {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 400;
  margin-bottom: 1.2rem;
  color: var(--text);
}

.framework-section p {
  font-size: .9rem;
  color: var(--muted);
  line-height: 1.9;
  margin-bottom: 1rem;
}

.framework-section ul {
  list-style: none;
  padding: 0;
  margin: 1.2rem 0;
}

.framework-section ul li {
  font-size: .875rem;
  color: var(--muted);
  padding: .5rem 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 1rem;
}

.framework-section ul li::before {
  content: '—';
  color: #444;
  flex-shrink: 0;
}

/* ── LINKS PAGE ── */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1px;
  margin: 3rem 0 5rem;
}

.link-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  transition: background .2s;
}
.link-card:hover { background: #1a1a1a; opacity: 1; }

.link-card-icon {
  font-size: 1.1rem;
  color: var(--muted);
}

.link-card-platform {
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
}

.link-card-label {
  font-family: var(--font-serif);
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--text);
}

.link-card-arrow {
  margin-top: auto;
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 3rem 0;
  margin-top: 2rem;
}

.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-copy {
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #444;
}

@media (max-width: 640px) {
  .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
  main { padding: 0 1.25rem; }
  .nav-inner { padding: 0 1.25rem; }
  .section-header { padding: 2.5rem 0 1.5rem; }
}


  </style>
</head>
