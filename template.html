<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ── Embedded fonts (injected by build.js) ─────────────────────────────────── */
{{FONT_CSS}}

/* ── Design tokens (print-adapted from style.css) ──────────────────────────── */
:root {
  --bg:         #ffffff;
  --text:       #111111;
  --muted:      #888888;
  --border:     #cccccc;
  --font-serif: 'Libre Baskerville', Georgia, serif;
  --font-sans:  'Helvetica Neue', Helvetica, Arial, sans-serif;
}

/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.7;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════════════════════════════════════════════
   HEADER — dark branded block (unchanged from v1)
   ══════════════════════════════════════════════════════════════════════════════ */
.report-header {
  background: #111111;
  page-break-inside: avoid;
  break-inside: avoid;
}

.header-top {
  padding: 32px 48px 0;
}

/* Row 1: logo + label */
.header-row1 {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.header-logo-link {
  display: block;
  line-height: 0;
  opacity: 1;
  transition: opacity .2s;
  text-decoration: none;
}
.header-logo-link:hover { opacity: .75; }

.header-logo img {
  height: 52px;
  width: auto;
  display: block;
}

.header-label {
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 10px;
  color: #d1d1d1;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Row 2: title / rating badge */
.header-row2 {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 20px;
  gap: 24px;
}

.header-title {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 20pt;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.15;
  margin-bottom: 5px;
}

.header-subtitle {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-style: italic;
  color: #999999;
}

/* Rating label — the ONE colored element in the document, plain text (no pill) */
.rating-badge {
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 4px;
}

/* Badge sits on the dark header — use bright variants for contrast */
.rating-badge.bullish { color: #4ade80; }
.rating-badge.neutral { color: #facc15; }
.rating-badge.bearish { color: #f87171; }

/* Row 3: meta strip */
.header-meta {
  background: #1a1a1a;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 11px;
  color: #cccccc;
  padding: 10px 48px;
  letter-spacing: 0.3px;
}

/* Row 4: published */
.header-published {
  padding: 10px 48px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: #666666;
  text-align: right;
}

/* ══════════════════════════════════════════════════════════════════════════════
   KEY FACTS — monotone card below header
   ══════════════════════════════════════════════════════════════════════════════ */
.keyfacts-card {
  background: #ffffff;
  border: 1px solid var(--border);
  border-top: none;
  padding: 24px 32px;
  page-break-inside: avoid;
  break-inside: avoid;
}

.keyfacts-table {
  width: 100%;
  border-collapse: collapse;
}

.keyfacts-table tr {
  border-bottom: 1px solid var(--border);
}

.keyfacts-table tr:last-child {
  border-bottom: none;
}

.keyfacts-table tr.alt {
  background: #f9f9f9;
}

.kf-label {
  font-family: var(--font-sans);
  font-size: .65rem;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  padding: 9px 16px 9px 0;
  width: 38%;
  vertical-align: top;
}

.kf-value {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: .875rem;
  font-weight: 400;
  color: var(--text);
  padding: 9px 0;
  vertical-align: top;
}

/* ══════════════════════════════════════════════════════════════════════════════
   ARTICLE BODY — exact match of post-1.html / style.css
   ══════════════════════════════════════════════════════════════════════════════ */
main {
  padding: 0 48px;
}

/* Matches style.css .article-body */
.article-body {
  max-width: 680px;
  padding: 3rem 0 5rem;
}

/* Matches style.css .article-body p */
.article-body p {
  font-size: .9375rem;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 1.5rem;
}

/* Matches style.css .article-body h2 */
.article-body h2 {
  font-size: 13pt;
  letter-spacing: .02em;
  text-transform: none;
  color: var(--text);
  margin: 3rem 0 1rem;
  font-weight: 600;
}

/* h3 — sub-section, slightly smaller */
.article-body h3 {
  font-size: .9rem;
  letter-spacing: .02em;
  text-transform: none;
  color: var(--muted);
  margin: 2rem 0 .75rem;
  font-weight: 600;
}

/* h1 if used in body — serif, editorial */
.article-body h1 {
  font-family: var(--font-serif);
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 1.2rem;
  line-height: 1.22;
}

/* Matches style.css .pull-quote */
.pull-quote {
  font-family: var(--font-serif);
  font-size: 1.35rem;
  font-style: italic;
  font-weight: 400;
  line-height: 1.5;
  color: var(--text);
  border-left: 1px solid var(--border);
  padding: 1rem 0 1rem 2rem;
  margin: 2.5rem 0;
}

/* Override .article-body p styles inside pull-quote */
.pull-quote p {
  font-size: inherit;
  line-height: inherit;
  color: inherit;
  margin: 0;
}

/* Bold */
.article-body strong {
  font-weight: 700;
  color: var(--text);
}

/* Italic */
.article-body em {
  font-style: italic;
}

/* Lists */
.article-body ul,
.article-body ol {
  margin: .5rem 0 1.5rem 1.5rem;
}

.article-body li {
  font-size: .9375rem;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: .4rem;
}

/* Tables — monotone, editorial */
.article-body table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-sans);
  font-size: .78rem;
  margin: 1.5rem 0;
  border: 1px solid var(--border);
  page-break-inside: auto;
}

.article-body table th {
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  font-weight: 700;
  padding: .75rem 1rem;
  border: 1px solid var(--border);
  background: #f5f5f5;
  color: var(--muted);
  text-align: left;
}

.article-body table td {
  font-family: 'Consolas', 'Courier New', monospace;
  padding: .75rem 1rem;
  border: 1px solid var(--border);
  color: var(--text);
}

.article-body table tr:nth-child(even) td {
  background: #f9f9f9;
}

/* Inline code */
.article-body code {
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: .78rem;
  background: #f5f5f5;
  padding: .1rem .3rem;
  border-radius: 2px;
  color: var(--text);
}

/* Code blocks */
.article-body pre {
  background: #f5f5f5;
  padding: 1rem 1.25rem;
  margin: 1rem 0;
  border-radius: 2px;
}

.article-body pre code {
  background: none;
  padding: 0;
  font-size: .78rem;
}

/* Horizontal rules */
.article-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2rem 0;
}

/* Images */
.article-body img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 1.5rem 0;
}

/* Matches style.css .back-link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 2rem 0 0;
  border-top: 1px solid var(--border);
}

/* ── Print breaks ───────────────────────────────────────────────────────────── */
@media print {
  .report-header { page-break-inside: avoid; }
  .keyfacts-card { page-break-inside: avoid; }
  table          { page-break-inside: auto; }
  tr             { page-break-inside: avoid; page-break-after: auto; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     HEADER — dark branded research block
     ═══════════════════════════════════════════════════════════════════════════ -->
<div class="report-header">

  <div class="header-top">
    <div class="header-row1">
      <div class="header-logo">
        <a href="/home/" class="header-logo-link">
          <img src="{{LOGO_SRC}}" alt="Elysium" />
        </a>
      </div>
      <div class="header-label">{{HEADER_LABEL}}</div>
    </div>

    <div class="header-row2">
      <div class="header-title-block">
        <div class="header-title">{{TITLE}}</div>
        <div class="header-subtitle">{{SUBTITLE}}</div>
      </div>
      {{RATING_BADGE}}
    </div>
  </div>

  {{META_STRIP_BLOCK}}
  <div class="header-published">Published by Elysium &nbsp;·&nbsp; {{PUBLISH_DATE}}</div>

</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     KEY FACTS
     ═══════════════════════════════════════════════════════════════════════════ -->
{{KEYFACTS_HTML}}

<!-- ═══════════════════════════════════════════════════════════════════════════
     BODY — injected into <main> matching post-1.html structure
     ═══════════════════════════════════════════════════════════════════════════ -->
<main>
  <div class="article-body">
    {{BODY_HTML}}
    <a class="back-link" href="/research/">← Back to Research</a>
  </div>
</main>

</body>
</html>
